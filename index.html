document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Fundraising<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Dopadový reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Evaluace programů<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Transparentní komunikace<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:32px;\"><div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:48px;height:48px;border-radius:14px;background:#EDEBFA;color:#5B4BD6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:19px;\">I<\u002Fspan><div><h3 style=\"font-size:21px;font-weight:600;color:#221C57;\">Investoři<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;\">Hodnocení dopadových investic<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-size:14.5px;color:#6B6980;line-height:1.6;margin-top:18px;font-weight:300;\">Hodnoťte společenský dopad investic, porovnávejte projekty a rozhodujte na základě dat. Impact due diligence pro moderní investory.<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\"><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Impact due diligence<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Srovnání projektů<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Portfolio reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">ESG hodnocení<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"text-align:center;margin-top:30px;font-size:15px;color:#5C5B74;font-weight:300;\">Nejste si jistí, do které kategorie patříte? <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"color:#2E2270;font-weight:500;text-decoration:none;\">Pojďme si promluvit →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PARTNEŘI -->\n  <section style=\"background:#fff;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:64px 28px;text-align:center;\">\n      <p class=\"reveal\" style=\"font-size:14px;color:#8A88A0;font-weight:300;\">Spolupracujeme s organizacemi, kterým záleží na skutečné změně<\u002Fp>\n      <h2 class=\"reveal\" style=\"font-size:30px;font-weight:500;letter-spacing:-.02em;margin:8px 0 0;color:#221C57;\">Partneři a klienti<\u002Fh2>\n      <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:30px;\">\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner A<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner B<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Klient C<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Nadace D<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner E<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Organizace F<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Klient G<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Firma H<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"reveal\" style=\"font-size:12.5px;color:#A8A6B8;margin-top:18px;font-weight:300;\">Loga a konkrétní reference budou doplněny — nyní probíhá příprava.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALY -->\n  <section style=\"background:#F4F5F7;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;\">\n      <div class=\"reveal\" style=\"text-align:center;max-width:760px;margin:0 auto;\">\n        <span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Jak pracujeme<\u002Fspan>\n        <h2 style=\"font-size:46px;font-weight:500;letter-spacing:-.02em;margin:20px 0 0;line-height:1.12;color:#221C57;\">Pomáháme proměnit dopad v <span class=\"gradtext\">systém<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:18px;color:#5C5B74;line-height:1.6;margin-top:18px;font-weight:300;\">Impactso propojuje strategické konzultace, metodiku, analýzu, reporting a technologii. Díky tomu pomáhá organizacím přejít od nahodilého vykazování aktivit k systematickému řízení dopadu.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:46px;\">\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Impactso guided us through the process of measuring impact directly in the context of our nonprofit organization and showed us how to effectively apply each step to our specific activities. We repeatedly came across the fact that the market lacks a quality and simple software solution for measuring impact. We are excited for Impactso to fill this gap, as it could save nonprofits significant time and simplify working with data.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#2E2270;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">J<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Jitka Šimková<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">Head of Organization and Finance · AI dětem<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Collaborating with Impactso has been a truly positive experience. Their team supported us in Allwyn in establishing impact measurement for our global volunteering project across all our markets. We greatly appreciated their flexibility, speed, and professionalism, as well as the excellent guidance and leadership they provided throughout both projects.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#4FB3A0;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">G<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Gabriela Löbel<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">CSR Manager · Allwyn<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Our long-term goal is to make our CSR/community activities more effective in terms of: impact and real change, PR opportunities, and/or business opportunities – e.g., building our brand and reaching new target customer groups. The collaboration with IMPACTSO helped us define the current state, confirm the significance of these activities’ contribution to our company, and set the next steps for greater efficiency.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#F2C200;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">H<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Hubert Topinka<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">ESG Manager · Zátiší Group a.s.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection><\u002Fdiv>\n  \n\n  <!-- AKTUALITY -->\n  <section id=\"aktuality\" style=\"background:#fff;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;\">\n      <div class=\"reveal\" style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n        <div style=\"max-width:640px;\"><span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Zdroje a vzdělávání<\u002Fspan><h2 style=\"font-size:46px;font-weight:500;letter-spacing:-.02em;margin:18px 0 0;line-height:1.12;color:#221C57;\">Aktuality, webináře t:1.3;\">Odebírejte náš newsletter ze světa impaktu<\u002Fdiv>\n          <p style=\"font-size:13px;color:#A6A2CF;line-height:1.5;margin-top:8px;font-weight:300;\">Registrujte se. Inspirujte se. Buďte součástí systémové změny.<\u002Fp>\n          <form onsubmit=\"{{ subscribe }}\" style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;\">\n            <input type=\"email\" value=\"{{ nlEmail }}\" onchange=\"{{ setNlEmail }}\" required=\"true\" placeholder=\"Váš e-mail\" style=\"flex:1;min-width:150px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:11px;padding:11px 14px;font-size:14px;font-family:inherit;color:#fff;outline:none;\">\n            <button type=\"submit\" style=\"background:#F2C200;color:#3A2E00;border:none;font-size:13px;font-weight:600;padding:11px 16px;border-radius:11px;cursor:pointer;white-space:nowrap;\">ODEBÍRAT<\u002Fbutton>\n          <\u002Fform>\n          <sc-if value=\"{{ nlSent }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-size:12.5px;color:#7BD3AE;margin-top:10px;\">Děkujeme za přihlášení k odběru!<\u002Fp>\n          <\u002Fsc-if>\n          <p style=\"font-size:11px;color:#807CAC;line-height:1.5;margin-top:10px;font-weight:300;\">Odesláním formuláře souhlasím se zpracováním osobních údajů a zasíláním marketingové komunikace.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">O nás<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:16px;\">\n          <a href=\"#kontakt\" style=\"font-size:14px;color:#A6A2CF;text-decoration:none;font-weight:300;\">FAQs<\u002Fa>\n          <a href=\"#kontakt\" style=\"font-size:14px;color:#A6A2CF;text-decoration:none;font-weight:300;\">Tým<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">Další zdroje<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:16px;\">\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Demo ukázka<\u002Fspan>\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Případové studie<\u002Fspan>\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Impactso Index<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">Kontakt<\u002Fdiv>\n        <p style=\"font-size:14px;color:#A6A2CF;line-height:1.6;margin-top:16px;font-weight:300;\">Máte otázku nebo zájem o spolupráci?<\u002Fp>\n        <div style=\"font-size:13.5px;color:#A6A2CF;line-height:1.7;margin-top:14px;font-weight:300;\">Impactso s.r.o.<br>K Zátiší 362/5, 147 00 Praha 4<br>IČO 19088159<br><a href=\"mailto:info@impactso.com\" style=\"color:#9D90F0;text-decoration:none;\">info@impactso.com<\u002Fa><\u002Fdiv>\n        <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"display:inline-block;margin-top:12px;background:#2E2270;color:#fff;text-decoration:none;font-size:13.5px;font-weight:500;padding:10px 18px;border-radius:11px;\">Domluvit konzultaci<\u002Fa>\n        <div style=\"display:flex;gap:10px;margin-top:18px;\">\n          <a href=\"https://www.linkedin.com/company/impactso\" target=\"_blank\" aria-label=\"LinkedIn\" style=\"width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#C7C3EC;\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"currentColor\"><path d=\"M4.98 3.5A2.5 2.5 0 102.5 6 2.5 2.5 0 004.98 3.5zM3 8.5h4V21H3zM9 8.5h3.8v1.7h.05a4.2 4.2 0 013.78-2.08c4 0 4.74 2.64 4.74 6.07V21H20.3v-5.5c0-1.31-.02-3-1.83-3s-2.1 1.43-2.1 2.9V21H12.6z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <a href=\"mailto:info@impactso.com\" aria-label=\"E-mail\" style=\"width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#C7C3EC;\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:0 auto;padding:20px 28px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;\">\n      <span style=\"font-size:12.5px;color:#8682B0;font-weight:300;\">© 2026 Impactso. Všechna práva vyhrazena.<\u002Fspan>\n      <div style=\"display:flex;gap:18px;\"><a href=\"#\" style=\"font-size:12.5px;color:#8682B0;text-decoration:none;font-weight:300;\">Zásady ochrany osobních údajů<\u002Fa><a href=\"#\" style=\"font-size:12.5px;color:#8682B0;text-decoration:none;font-weight:300;\">Cookies<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name:'', email:'', org:'', type:'', message:'', sent:false, lang:'cz', nlEmail:'', nlSent:false };\n  EN = {\n    \"Proč dopad\":\"Why impact\",\"Služby\":\"Services\",\"Platforma\":\"Platform\",\"Klienti\":\"Clients\",\"Aktuality\":\"News\",\"Kontakt\":\"Contact\",\n    \"Pomáháme společensky odpovědným firmám, neziskovým organizacím a nadacím prokázat návratnost investic do sociálního dopadu prostřednictvím sběru, vyhodnocování a vykazování jejich aktivit na základě teorie změny.\":\"We help socially responsible companies, nonprofits, and foundations prove the return on their investments into social impact by collecting, evaluating, and reporting their activities based on a theory of change.\",\n    \"Domluvit strategickou konzultaci\":\"Book a strategic consultation\",\"Zjistit, proč měřit dopad\":\"Learn why to measure impact\",\n    \"Pro firmy, nadace, neziskové organizace a investory\":\"For companies, foundations, nonprofits, and investors\",\n    \"Efektivita\":\"Efficiency\",\"Řízení\":\"Management\",\"Komunikace\":\"Communication\",\n    \"Dlouhodobá spolupráce\":\"Long-term partnership\",\"Klientů\":\"Clients\",\"Realizovaných workshopů\":\"Workshops delivered\",\"Let zkušeností\":\"Years of experience\",\n    \"Proč to dělat systematicky\":\"Why do it systematically\",\"Proč měřit společenský dopad?\":\"Why measure social impact?\",\n    \"Celosvětově čelíme bezprecedentní krizi nedůvěry a izolace. 60 % lidí je přesvědčených, že je systém zmanipulovaný, přímo je poškozuje a slouží pouze úzké skupině bohatých.\":\"Globally we face an unprecedented crisis of distrust and isolation. 60% of people believe the system is rigged, harms them directly, and serves only a narrow group of the wealthy.\",\n    \"(Edelman Trust Barometer 2026)\":\"(Edelman Trust Barometer 2026)\",\n    \"Jsme tu proto, abychom to změnili. Chceme vrátit do hry všechny shareholdery a pomoci nastavit systém, ze kterého profitují všichni — a ukázat skutečný pozitivní dopad odpovědných firem, neziskových organizací a nadací.\":\"We are here to change that. We want to bring all stakeholders back into the game and help set up a system that benefits everyone — and show the real positive impact of responsible companies, nonprofits, and foundations.\",\n    \"Důvěra\":\"Trust\",\"Měření dopadu pomáhá transparentně ukazovat, co se díky vaší práci skutečně děje. Stakeholdeři vidí reálné výsledky, ne jen záměry.\":\"Impact measurement transparently shows what your work actually changes. Stakeholders see real results, not just intentions.\",\n    \"Lepší rozhodování\":\"Better decisions\",\"Data o dopadu pomáhají lépe alokovat peníze, energii i kapacity. Víte, co funguje, a dokážete to zdůvodnit.\":\"Impact data help you allocate money, energy, and capacity better. You know what works and can justify it.\",\n    \"Efektivita prostředků\":\"Resource efficiency\",\"Ukazuje, které aktivity přinášejí největší hodnotu a kde je prostor pro zlepšení. Každá koruna pracuje chytřeji.\":\"It shows which activities create the most value and where there is room to improve. Every crown works smarter.\",\n    \"Silnější komunikace\":\"Stronger communication\",\"Dopad pomáhá vyprávět příběh organizace konkrétně, důvěryhodně a srozumitelně — pro donory, partnery i veřejnost.\":\"Impact helps tell your organization's story concretely, credibly, and clearly — for donors, partners, and the public.\",\n    \"Organizace, které měří dopad, jsou důvěryhodnější, efektivnější a lépe financované.\":\"Organizations that measure impact are more trustworthy, more effective, and better funded.\",\n    \"Donátoři, investoři i partneři se stále více rozhodují podle dat — ne jen podle záměrů.\":\"Donors, investors, and partners increasingly decide based on data — not just intentions.\",\n    \"Klíčový trend 2024–2026\":\"Key trend 2024–2026\",\n    \"Problém, který řešíme\":\"The problem we solve\",\"Když dopad neměříme, zůstáváme u dojmů\":\"Without measuring impact, we stay at impressions\",\n    \"Mnoho organizací dělá smysluplnou práci, ale nedokáže ji jednoduše doložit, řídit ani komunikovat. Výsledkem je nižší důvěra, slabší reporting a rozhodování podle pocitů místo dat.\":\"Many organizations do meaningful work but can't easily evidence, manage, or communicate it. The result is lower trust, weaker reporting, and decisions based on gut feeling instead of data.\",\n    \"Bez měření dopadu\":\"Without impact measurement\",\"Jak to vypadá dnes\":\"How it looks today\",\n    \"Roztříštěná data v různých tabulkách a souborech\":\"Fragmented data across various spreadsheets and files\",\n    \"Nejasné výsledky — víme, co děláme, ne co to mění\":\"Unclear results — we know what we do, not what it changes\",\n    \"Reporting jako povinná administrativa\":\"Reporting as mandatory paperwork\",\n    \"Slabší argumentace před donory a investory\":\"Weaker arguments before donors and investors\",\n    \"Rozhodování podle pocitů místo dat\":\"Decisions based on gut feeling instead of data\",\n    \"Nízká důvěra stakeholderů\":\"Low stakeholder trust\",\"Typický reporting bez systému\":\"Typical reporting without a system\",\n    \"S Impactso\":\"With Impactso\",\"Jak to vypadá se systémem\":\"How it looks with a system\",\n    \"Jasný rámec dopadu — víme, co měříme a proč\":\"A clear impact framework — we know what we measure and why\",\n    \"Data připravená k rozhodování v reálném čase\":\"Data ready for decisions in real time\",\n    \"Reporting, který dává smysl a posiluje vztahy\":\"Reporting that makes sense and strengthens relationships\",\n    \"Silnější argumentace a vyšší důvěryhodnost\":\"Stronger arguments and greater credibility\",\n    \"Lepší alokace prostředků na základě výsledků\":\"Better resource allocation based on results\",\n    \"Stakeholdeři vidí hodnotu a věří ve vaši práci\":\"Stakeholders see the value and trust your work\",\n    \"Přehledný reporting s Impactso\":\"Clear reporting with Impactso\",\"Dopad\":\"Impact\",\n    \"Přechod od pocitů\":\"From gut feeling\",\"k datovým rozhodnutím\":\"to data-driven decisions\",\n    \"Zákaznická cesta\":\"Customer journey\",\"Od první konzultace po platformu\":\"From the first consultation to a platform\",\"pro správu dopadu\":\"for managing impact\",\n    \"Každá spolupráce začíná tam, kde jste dnes, a postupuje tempem, které vám dává smysl.\":\"Every collaboration starts where you are today and moves at a pace that makes sense for you.\",\n    \"Analýza\":\"Analysis\",\"Chytrá analýza aktuálního stavu. Pomůže odhalit, kde se organizace nachází a jaké kroky dávají největší smysl.\":\"A smart analysis of the current state. It helps reveal where the organization stands and which steps make the most sense.\",\n    \"Strategická konzultace\":\"Strategic consultation\",\"Zmapujeme vaši situaci, potřeby, cíle a příležitosti v oblasti měření dopadu. Společně najdeme nejlepší první krok.\":\"We map your situation, needs, goals, and opportunities in impact measurement. Together we find the best first step.\",\n    \"Metodika\":\"Methodology\",\"Návrh rámce dopadu\":\"Impact framework design\",\"Společně definujeme logiku změny, cílové skupiny, výstupy, výsledky a indikátory. Základ pro vše, co následuje.\":\"Together we define the theory of change, target groups, outputs, outcomes, and indicators. The foundation for everything that follows.\",\n    \"Výstupy\":\"Outputs\",\"Reporting a komunikace\":\"Reporting and communication\",\"Převedeme data do srozumitelných výstupů pro management, donory, partnery nebo veřejnost.\":\"We turn data into clear outputs for management, donors, partners, or the public.\",\n    \"Impactso Platforma\":\"Impactso Platform\",\"Digitální prostředí pro správu, sběr a vyhodnocování dat o dopadu. Dopad na jednom místě, dostupný kdykoliv.\":\"A digital environment for managing, collecting, and evaluating impact data. Impact in one place, available anytime.\",\n    \"Chci zjistit, kde začít\":\"I want to find out where to start\",\n    \"Technologické zázemí\":\"Technology behind it\",\"Data o dopadu na\":\"Impact data in\",\"jednom místě\":\"one place\",\n    \"Impactso Platforma pomáhá organizacím sbírat, spravovat a vyhodnocovat data o společenském dopadu. Reporting se nestává jednorázovou povinností, ale nástrojem pro řízení změny.\":\"Impactso Platform helps organizations collect, manage, and evaluate social impact data. Reporting becomes not a one-off duty but a tool for managing change.\",\n    \"Indikátory\":\"Indicators\",\"+3 tento měsíc\":\"+3 this month\",\"Datové sady\":\"Datasets\",\"+12 tento měsíc\":\"+12 this month\",\"Reporty\":\"Reports\",\"+1 tento měsíc\":\"+1 this month\",\n    \"Trend dopadu — poslední 6 měsíců\":\"Impact trend — last 6 months\",\"Vzdělávání\":\"Education\",\"Zaměstnatelnost\":\"Employability\",\"Komunita\":\"Community\",\n    \"Správa indikátorů\":\"Indicator management\",\"Definujte a spravujte klíčové ukazatele dopadu na jednom místě. Sledujte, co opravdu měříte.\":\"Define and manage key impact indicators in one place. Track what you really measure.\",\n    \"Sběr dat\":\"Data collection\",\"Centralizovaný sběr dat ze všech zdrojů — formuláře, integrace, ruční vkládání. Vše přehledně na jednom místě.\":\"Centralized data collection from all sources — forms, integrations, manual entry. All clearly in one place.\",\n    \"Vyhodnocování dopadu\":\"Impact evaluation\",\"Automatizované výpočty, trendová analýza a přehledné vizualizace. Rychle pochopíte, co data říkají.\":\"Automated calculations, trend analysis, and clear visualizations. Quickly understand what the data say.\",\n    \"Reporting a exporty\":\"Reporting and exports\",\"Generujte reporty pro různé stakeholdery. Export do PDF, Excelu nebo přímé sdílení přes platformu.\":\"Generate reports for various stakeholders. Export to PDF, Excel, or share directly via the platform.\",\n    \"Platforma v aktivním vývoji — zapojte se jako první, vaše potřeby formují, jak vypadá.\":\"Platform in active development — join first, your needs shape how it looks.\",\n    \"Pro koho pracujeme\":\"Who we work for\",\"Pro organizace, které chtějí rozhodovat\":\"For organizations that want to decide\",\"podle dopadu\":\"by impact\",\n    \"Pracujeme s různými typy organizací. Každá má jiné potřeby — ale sdílí jeden cíl: vytvářet prokazatelnou hodnotu.\":\"We work with various types of organizations. Each has different needs — but shares one goal: to create provable value.\",\n    \"Firmy\":\"Companies\",\"CSR, ESG, nadační a komunitní programy\":\"CSR, ESG, foundation and community programs\",\n    \"Prokažte smysluplnost vašich společenských aktivit. Lépe rozhodujte o alokaci prostředků a komunikujte hodnotu CSR a ESG programů stakeholderům i veřejnosti.\":\"Prove the meaningfulness of your social activities. Make better resource-allocation decisions and communicate the value of CSR and ESG programs to stakeholders and the public.\",\n    \"CSR měření\":\"CSR measurement\",\"Komunitní programy\":\"Community programs\",\"Nadační aktivity\":\"Foundation activities\",\n    \"Nadace\":\"Foundations\",\"Grantové programy a komunikace výsledků\":\"Grant programs and results communication\",\n    \"Lépe měřte výsledky grantových programů, komunikujte dopad donorům a zvyšujte důvěryhodnost vaší práce. Data, která mluví za vás.\":\"Measure grant-program results better, communicate impact to donors, and increase the credibility of your work. Data that speak for you.\",\n    \"Grantový reporting\":\"Grant reporting\",\"Dopad programů\":\"Program impact\",\"Komunikace donorům\":\"Donor communication\",\"Hodnocení příjemců\":\"Recipient evaluation\",\n    \"Neziskové organizace\":\"Nonprofits\",\"Řízení dopadu a fundraising\":\"Impact management and fundraising\",\n    \"Ukažte hodnotu své práce, zlepšete reporting a získejte silnější argumenty pro fundraising. Systematické řízení dopadu, které dává smysl i malým týmům.\":\"Show the value of your work, improve reporting, and gain stronger arguments for fundraising. Systematic impact management that makes sense even for small teams.\",\n    \"Dopadový reporting\":\"Impact reporting\",\"Evaluace programů\":\"Program evaluation\",\"Transparentní komunikace\":\"Transparent communication\",\n    \"Investoři\":\"Investors\",\"Hodnocení dopadových investic\":\"Impact investment evaluation\",\n    \"Hodnoťte společenský dopad investic, porovnávejte projekty a rozhodujte na základě dat. Impact due diligence pro moderní investory.\":\"Assess the social impact of investments, compare projects, and decide based on data. Impact due diligence for modern investors.\",\n    \"Srovnání projektů\":\"Project comparison\",\"ESG hodnocení\":\"ESG assessment\",\n    \"Nejste si jistí, do které kategorie patříte?\":\"Not sure which category you fit?\",\"Pojďme si promluvit →\":\"Let's talk →\",\n    \"Spolupracujeme s organizacemi, kterým záleží na skutečné změně\":\"We work with organizations that care about real change\",\n    \"Partneři a klienti\":\"Partners and clients\",\"Loga a konkrétní reference budou doplněny — nyní probíhá příprava.\":\"Logos and specific references will be added — preparation is underway.\",\n    \"Jak pracujeme\":\"How we work\",\"Pomáháme proměnit dopad v\":\"We help turn impact into a\",\"systém\":\"system\",\n    \"Impactso propojuje strategické konzultace, metodiku, analýzu, reporting a technologii. Díky tomu pomáhá organizacím přejít od nahodilého vykazování aktivit k systematickému řízení dopadu.\":\"Impactso connects strategic consulting, methodology, analysis, reporting, and technology. This helps organizations move from ad-hoc activity reporting to systematic impact management.\",\n    \"Zdroje a vzdělávání\":\"Resources and education\",\"Aktuality, webináře a zdroje\":\"News, webinars and resources\",\n    \"Průvodci, webináře a materiály o měření dopadu pro organizace.\":\"Guides, webinars, and materials on impact measurement for organizations.\",\n    \"Zobrazit vše\":\"View all\",\"Brzy\":\"Soon\",\"Webinář\":\"Webinar\",\"Jak začít s měřením společenského dopadu\":\"How to start measuring social impact\",\n    \"Praktický úvod pro organizace, které chtějí přejít od aktivit k výsledkům. Bez zbytečné teorie — rovnou k věci.\":\"A practical intro for organizations that want to move from activities to results. No unnecessary theory — straight to the point.\",\n    \"Registrovat se →\":\"Register →\",\"Obsah bude brzy publikován\":\"Content will be published soon\",\"Článek\":\"Article\",\n    \"Proč nestačí měřit jen aktivity\":\"Why measuring activities alone isn't enough\",\n    \"Počet akcí, účastníků a výstupů ještě neznamená dopad. V čem je rozdíl a jak to napravit — přehledně a bez žargonu.\":\"The number of events, participants, and outputs doesn't yet mean impact. What's the difference and how to fix it — clearly and without jargon.\",\n    \"Číst článek →\":\"Read article →\",\"První kroky k impact frameworku\":\"First steps toward an impact framework\",\n    \"Stručný průvodce pro organizace, které se chystají nastavit první logiku změny a indikátory dopadu.\":\"A brief guide for organizations about to set up their first theory of change and impact indicators.\",\n    \"Stáhnout zdarma →\":\"Download for free →\",\n    \"Začněme spolupráci\":\"Let's start working together\",\"Chcete zjistit, jak může měření dopadu pomoci vaší organizaci?\":\"Want to find out how impact measurement can help your organization?\",\n    \"Domluvte si strategickou konzultaci nebo nám napište, jaké téma chcete řešit. Společně najdeme nejlepší první krok.\":\"Book a strategic consultation or write to us about the topic you want to address. Together we'll find the best first step.\",\n    \"30minutový call, ve kterém zmapujeme vaši situaci a najdeme nejlepší první krok pro měření dopadu ve vaší organizaci.\":\"A 30-minute call in which we map your situation and find the best first step for measuring impact in your organization.\",\n    \"Zcela zdarma, bez závazků\":\"Completely free, no commitment\",\"Online nebo osobně\":\"Online or in person\",\"Odpovíme na vaše otázky\":\"We'll answer your questions\",\"Konkrétní doporučení pro váš případ\":\"Specific recommendations for your case\",\n    \"Domluvit 30min konzultaci\":\"Book a 30-min consultation\",\n    \"Diagnostický nástroj\":\"Diagnostic tool\",\"Zjistěte, jak je vaše organizace připravená měřit dopad\":\"Find out how ready your organization is to measure impact\",\n    \"Impactso Index je chytrá analýza aktuálního stavu organizace. Pomůže vám pochopit, jak dnes pracujete s dopadem, kde jsou slabá místa a jaké kroky vám pomohou posunout se dál.\":\"Impactso Index is a smart analysis of your organization's current state. It helps you understand how you work with impact today, where the weak spots are, and which steps will move you forward.\",\n    \"Zjistíte, jak systematicky pracujete s dopadem dnes\":\"See how systematically you work with impact today\",\n    \"Odhalíte konkrétní slabá místa a příležitosti\":\"Uncover specific weak spots and opportunities\",\n    \"Dostanete doporučení pro nejbližší kroky\":\"Get recommendations for the next steps\",\"Celý proces trvá méně než 15 minut\":\"The whole process takes under 15 minutes\",\n    \"Vyplnit Impactso Index\":\"Fill in Impactso Index\",\"Formulář bude brzy k dispozici. Zatím nám napište — rádi vám index provedeme osobně.\":\"The form will be available soon. For now, write to us — we'll gladly guide you through the index personally.\",\n    \"Zdarma\":\"Free\",\"Bez závazků\":\"No commitment\",\"Ukázkové hodnocení organizace\":\"Sample organization assessment\",\"z 100 bodů\":\"of 100 points\",\"Strategie dopadu\":\"Impact strategy\",\n    \"Doporučení pro vás\":\"Recommendation for you\",\"Máte solidní základ ve strategii. Největší příležitost je ve sběru dat a systematizaci reportingu.\":\"You have a solid foundation in strategy. The biggest opportunity is in data collection and systematizing reporting.\",\n    \"Ukázkový výstup — váš výsledek se bude lišit\":\"Sample output — your result will differ\",\n    \"Odebírejte náš newsletter ze světa impaktu\":\"Subscribe to our newsletter from the world of impact\",\"Registrujte se. Inspirujte se. Buďte součástí systémové změny.\":\"Sign up. Get inspired. Be part of systemic change.\",\n    \"ODEBÍRAT\":\"SUBSCRIBE\",\"Odesláním formuláře souhlasím se zpracováním osobních údajů a zasíláním marketingové komunikace.\":\"By submitting the form I consent to the processing of personal data and to receiving marketing communication.\",\n    \"O nás\":\"About us\",\"Tým\":\"Team\",\"Další zdroje\":\"Resources\",\"Demo ukázka\":\"Request a Demo\",\"Případové studie\":\"Case studies\",\n    \"Máte otázku nebo zájem o spolupráci?\":\"Have a question or interest in working together?\",\"Domluvit konzultaci\":\"Book a consultation\",\n    \"© 2026 Impactso. Všechna práva vyhrazena.\":\"© 2026 Impactso. All rights reserved.\",\"Zásady ochrany osobních údajů\":\"Privacy policy\",\n    \"Head of Organization and Finance · AI dětem\":\"Head of Organization and Finance · AI dětem\",\"CSR Manager · Allwyn\":\"CSR Manager · Allwyn\",\"ESG Manager · Zátiší Group a.s.\":\"ESG Manager · Zátiší Group a.s.\"\n  };\n  CZ = {\n    \"Impactso guided us through the process of measuring impact directly in the context of our nonprofit organization and showed us how to effectively apply each step to our specific activities. We repeatedly came across the fact that the market lacks a quality and simple software solution for measuring impact. We are excited for Impactso to fill this gap, as it could save nonprofits significant time and simplify working with data.\":\"Impactso nás provedlo procesem měření dopadu přímo v kontextu naší neziskové organizace a ukázalo nám, jak každý krok účinně aplikovat na naše konkrétní aktivity. Opakovaně jsme naráželi na to, že na trhu chybí kvalitní a jednoduché softwarové řešení pro měření dopadu. Těšíme se, až Impactso tuto mezeru vyplní, protože by mohlo neziskovkám ušetřit spoustu času a zjednodušit práci s daty.\",\n    \"Collaborating with Impactso has been a truly positive experience. Their team supported us in Allwyn in establishing impact measurement for our global volunteering project across all our markets. We greatly appreciated their flexibility, speed, and professionalism, as well as the excellent guidance and leadership they provided throughout both projects.\":\"Spolupráce s Impactso byla skutečně pozitivní zkušenost. Jejich tým nám v Allwyn pomohl nastavit měření dopadu našeho globálního dobrovolnického projektu napříč všemi trhy. Velmi jsme ocenili jejich flexibilitu, rychlost a profesionalitu i vynikající vedení, které nám v průběhu obou projektů poskytovali.\",\n    \"Our long-term goal is to make our CSR/community activities more effective in terms of: impact and real change, PR opportunities, and/or business opportunities – e.g., building our brand and reaching new target customer groups. The collaboration with IMPACTSO helped us define the current state, confirm the significance of these activities’ contribution to our company, and set the next steps for greater efficiency.\":\"Naším dlouhodobým cílem je zefektivnit naše CSR/komunitní aktivity z hlediska: dopadu a reálné změny, PR příležitostí a/nebo obchodních příležitostí – např. budování značky a oslovení nových cílových skupin zákazníků. Spolupráce s IMPACTSO nám pomohla definovat současný stav, potvrdit význam přínosu těchto aktivit pro naši firmu a nastavit další kroky k vyšší efektivitě.\",\n    \"Head of Organization and Finance · AI dětem\":\"Vedoucí organizace a financí · AI dětem\",\"CSR Manager · Allwyn\":\"CSR manažerka · Allwyn\",\"ESG Manager · Zátiší Group a.s.\":\"ESG manažer · Zátiší Group a.s.\"\n  };\n  collectNodes() {\n    if (!this._orig) this._orig = new WeakMap();\n    const scope = this.root.parentElement || this.root;\n    const w = document.createTreeWalker(scope, NodeFilter.SHOW_TEXT);\n    this._nodes = []; let n;\n    while (n = w.nextNode()) {\n      if (!n.nodeValue.trim()) continue;\n      if (!this._orig.has(n)) this._orig.set(n, n.nodeValue);\n      this._nodes.push(n);\n    }\n  }\n  applyLang(lang) {\n    if (!this.root) return;\n    this.collectNodes();\n    const map = lang === 'en' ? this.EN : this.CZ;\n    this._nodes.forEach((node) => {\n      const raw = this._orig.get(node); const key = raw.trim();\n      const tr = map[key];\n      node.nodeValue = tr ? raw.replace(key, tr) : raw;\n    });\n    const inp = (this.root.parentElement || this.root).querySelector('input[type=\"email\"]');\n    if (inp) inp.placeholder = lang === 'en' ? 'Your e-mail' : 'Váš e-mail';\n  }\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState && prevState.lang !== this.state.lang) this.applyLang(this.state.lang);\n  }\n  componentDidMount() {\n    if (!this.root) return;\n    const els = () => [...this.root.querySelectorAll('.reveal:not(.anim)')];\n    const check = () => {\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      els().forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < h * 0.95 && r.bottom > 0) el.classList.add('anim');\n      });\n    };\n    this._check = check;\n    check();\n    requestAnimationFrame(check);\n    window.addEventListener('scroll', check, true);\n    window.addEventListener('resize', check);\n    this.applyLang(this.state.lang);\n  }\n  componentWillUnmount() {\n    if (this._check) { window.removeEventListener('scroll', this._check, true); window.removeEventListener('resize', this._check); }\n  }\n  set = (k) => (e) => this.setState({ [k]: e.target.value });\n  submit = (e) => { e.preventDefault(); if(this.state.name && this.state.email && this.state.message) this.setState({ sent:true }); };\n  renderVals() {\n    return {\n      rootRef: (el)=>{ this.root = el; },\n      name:this.state.name, email:this.state.email, org:this.state.org, type:this.state.type, message:this.state.message,\n      sent:this.state.sent, notSent:!this.state.sent,\n      setName:this.set('name'), setEmail:this.set('email'), setOrg:this.set('org'), setType:this.set('type'), setMessage:this.set('message'),\n      submit:this.submit,\n      setCz:()=>{this.setState({lang:'cz'}); this.applyLang('cz');}, setEn:()=>{this.setState({lang:'en'}); this.applyLang('en');},\n      nlEmail:this.state.nlEmail, nlSent:this.state.nlSent, setNlEmail:this.set('nlEmail'),\n      subscribe:(e)=>{e.preventDefault(); if(this.state.nlEmail) this.setState({nlSent:true});},\n      czBg:this.state.lang==='cz'?'#2E2270':'transparent', czColor:this.state.lang==='cz'?'#fff':'#6B6980',\n      enBg:this.state.lang==='en'?'#2E2270':'transparent', enColor:this.state.lang==='en'?'#fff':'#6B6980'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
