document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

CSR a ESG programů stakeholderům i veřejnosti.<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\"><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">ESG reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">CSR měření<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Komunitní programy<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Nadační aktivity<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Dobrovolnictví<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:32px;\"><div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:48px;height:48px;border-radius:14px;background:#DDEEE8;color:#2F8F77;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:19px;\">N<\u002Fspan><div><h3 style=\"font-size:21px;font-weight:600;color:#221C57;\">Nadace<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;\">Grantové programy a komunikace výsledků<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-size:14.5px;color:#6B6980;line-height:1.6;margin-top:18px;font-weight:300;\">Lépe měřte výsledky grantových programů, komunikujte dopad donorům a zvyšujte důvěryhodnost vaší práce. Data, která mluví za vás.<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\"><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Grantový reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Dopad programů<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Komunikace donorům<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Hodnocení příjemců<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:32px;\"><div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:48px;height:48px;border-radius:14px;background:#FBF1CF;color:#A9820A;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;\">NO<\u002Fspan><div><h3 style=\"font-size:21px;font-weight:600;color:#221C57;\">Neziskové organizace<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;\">Řízení dopadu a fundraising<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-size:14.5px;color:#6B6980;line-height:1.6;margin-top:18px;font-weight:300;\">Ukažte hodnotu své práce, zlepšete reporting a získejte silnější argumenty pro fundraising. Systematické řízení dopadu, které dává smysl i malým týmům.<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\"><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Fundraising<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Dopadový reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Evaluace programů<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Transparentní komunikace<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:32px;\"><div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:48px;height:48px;border-radius:14px;background:#EDEBFA;color:#5B4BD6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:19px;\">I<\u002Fspan><div><h3 style=\"font-size:21px;font-weight:600;color:#221C57;\">Investoři<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;\">Hodnocení dopadových investic<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-size:14.5px;color:#6B6980;line-height:1.6;margin-top:18px;font-weight:300;\">Hodnoťte společenský dopad investic, porovnávejte projekty a rozhodujte na základě dat. Impact due diligence pro moderní investory.<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\"><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Impact due diligence<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Srovnání projektů<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">Portfolio reporting<\u002Fspan><span style=\"background:#F2F1F7;color:#6B6980;font-size:12.5px;font-weight:400;padding:6px 12px;border-radius:999px;\">ESG hodnocení<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"text-align:center;margin-top:30px;font-size:15px;color:#5C5B74;font-weight:300;\">Nejste si jistí, do které kategorie patříte? <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"color:#2E2270;font-weight:500;text-decoration:none;\">Pojďme si promluvit →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PARTNEŘI -->\n  <section style=\"background:#fff;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:64px 28px;text-align:center;\">\n      <p class=\"reveal\" style=\"font-size:14px;color:#8A88A0;font-weight:300;\">Spolupracujeme s organizacemi, kterým záleží na skutečné změně<\u002Fp>\n      <h2 class=\"reveal\" style=\"font-size:30px;font-weight:500;letter-spacing:-.02em;margin:8px 0 0;color:#221C57;\">Partneři a klienti<\u002Fh2>\n      <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:30px;\">\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner A<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner B<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Klient C<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Nadace D<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Partner E<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Organizace F<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Klient G<\u002Fdiv>\n        <div style=\"background:#F4F5F7;border:1px solid #ECECF1;border-radius:14px;padding:24px;color:#A8A6B8;font-weight:500;font-size:15px;\">Firma H<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"reveal\" style=\"font-size:12.5px;color:#A8A6B8;margin-top:18px;font-weight:300;\">Loga a konkrétní reference budou doplněny — nyní probíhá příprava.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALY -->\n  <section style=\"background:#F4F5F7;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;\">\n      <div class=\"reveal\" style=\"text-align:center;max-width:760px;margin:0 auto;\">\n        <span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Jak pracujeme<\u002Fspan>\n        <h2 style=\"font-size:46px;font-weight:500;letter-spacing:-.02em;margin:20px 0 0;line-height:1.12;color:#221C57;\">Pomáháme proměnit dopad v <span class=\"gradtext\">systém<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:18px;color:#5C5B74;line-height:1.6;margin-top:18px;font-weight:300;\">Impactso propojuje strategické konzultace, metodiku, analýzu, reporting a technologii. Díky tomu pomáhá organizacím přejít od nahodilého vykazování aktivit k systematickému řízení dopadu.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:46px;\">\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Impactso nás provedlo procesem měření dopadu přímo v kontextu naší neziskové organizace a ukázalo nám, jak jednotlivé kroky účinně aplikovat na naše konkrétní aktivity. Oceňujeme, že Impactso propojuje srozumitelnou metodiku s praktickým softwarovým řešením, které neziskovým organizacím šetří čas, zjednodušuje práci s daty a pomáhá lépe prokazovat skutečný dopad jejich práce.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#2E2270;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">J<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Jitka Šimková<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">Head of Organization and Finance · AI dětem<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Collaborating with Impactso has been a truly positive experience. Their team supported us in Allwyn in establishing impact measurement for our global volunteering project across all our markets. We greatly appreciated their flexibility, speed, and professionalism, as well as the excellent guidance and leadership they provided throughout both projects.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#4FB3A0;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">G<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Gabriela Löbel<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">CSR Manager · Allwyn<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"reveal\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;\"><div style=\"font-size:40px;color:#E0DEF0;font-weight:700;line-height:.6;height:18px;\">“<\u002Fdiv><p style=\"font-size:15px;color:#3C3A52;line-height:1.65;flex:1;font-weight:300;\">Our long-term goal is to make our CSR/community activities more effective in terms of: impact and real change, PR opportunities, and/or business opportunities – e.g., building our brand and reaching new target customer groups. The collaboration with IMPACTSO helped us define the current state, confirm the significance of these activities’ contribution to our company, and set the next steps for greater efficiency.<\u002Fp><div style=\"display:flex;align-items:center;gap:12px;margin-top:22px;\"><span style=\"width:44px;height:44px;border-radius:50%;background:#F2C200;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;\">H<\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600;color:#221C57;\">Hubert Topinka<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">ESG Manager · Zátiší Group a.s.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection><\u002Fdiv>\n  \n\n  <!-- AKTUALITY -->\n  <section id=\"aktuality\" style=\"background:#fff;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;\">\n      <div class=\"reveal\" style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n        <div style=\"max-width:640px;\"><span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Reference<\u002Fspan><h2 style=\"font-size:46px;font-weight:500;letter-spacing:-.02em;margin:18px 0 0;line-height:1.12;color:#221C57;\">Případové studie<\u002Fh2><p style=\"font-size:17px;color:#5C5B74;line-height:1.6;margin-top:14px;font-weight:300;\">Podívejte se, jak Impactso pomáhá firmám a organizacím proměnit investice do komunity, dobrovolnictví a grantové programy v měřitelný společenský dopad.<\u002Fp><\u002Fdiv>\n        <a href=\"https://docs.google.com/document/d/e/2PACX-1vRwFTapxQwI475TKpI_mlho7NxgCQO5QBsKdbbTOXbLFtv71_s4rwSyluP1FyV8_7V2sQGZlRMEC3I9/pub\" target=\"_blank\" style=\"background:#fff;border:1px solid #E4E3EC;color:#221C57;text-decoration:none;font-size:14px;font-weight:500;padding:11px 20px;border-radius:11px;white-space:nowrap;\">Zobrazit vše<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:38px;\">\n        <a href=\"https://docs.google.com/document/d/e/2PACX-1vRwFTapxQwI475TKpI_mlho7NxgCQO5QBsKdbbTOXbLFtv71_s4rwSyluP1FyV8_7V2sQGZlRMEC3I9/pub\" target=\"_blank\" class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;text-decoration:none;\"><div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#EDEBFA;color:#5B4BD6;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Měření dopadu<\u002Fspan><span style=\"background:#DDEEE8;color:#2F8F77;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Reporting &amp; evaluace<\u002Fspan><\u002Fdiv><h3 style=\"font-size:20px;font-weight:600;margin:16px 0 4px;line-height:1.3;color:#221C57;\">Allwyn — Make a Difference Month<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;margin-bottom:10px;\">Zaměstnanecké dobrovolnictví napříč zeměmi<\u002Fdiv><p style=\"font-size:14px;color:#6B6980;line-height:1.6;flex:1;font-weight:300;\">Impactso pomohlo Allwyn změřit společenskou hodnotu zaměstnaneckého dobrovolnictví, fundraisingu a darování zdrojů napříč několika zeměmi. Vznikl jednotný rámec, nástroje pro zpětnou vazbu stakeholderů a konsolidovaný reporting — Allwyn se tak posunul od počítání aktivit k důkazům o reálném dopadu v komunitách.<\u002Fp><span style=\"color:#2E2270;font-weight:500;font-size:14px;margin-top:18px;\">Číst více →<\u002Fspan><\u002Fa>\n        <a href=\"https://docs.google.com/document/d/e/2PACX-1vRwFTapxQwI475TKpI_mlho7NxgCQO5QBsKdbbTOXbLFtv71_s4rwSyluP1FyV8_7V2sQGZlRMEC3I9/pub\" target=\"_blank\" class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;text-decoration:none;\"><div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#EDEBFA;color:#5B4BD6;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Strategie dopadu<\u002Fspan><span style=\"background:#FBF1CF;color:#A9820A;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Evaluace<\u002Fspan><\u002Fdiv><h3 style=\"font-size:20px;font-weight:600;margin:16px 0 4px;line-height:1.3;color:#221C57;\">Allwyn — Global Community Award<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;margin-bottom:10px;\">Grantový program ve spojení s F1®<\u002Fdiv><p style=\"font-size:14px;color:#6B6980;line-height:1.6;flex:1;font-weight:300;\">Impactso pomohlo Allwyn navrhnout dopadově orientovaný proces přihlašování a hodnocení pro F1® Allwyn Global Community Award. Rámec propojil komunitní projekty se strategickými pilíři Allwyn, cíli udržitelného rozvoje a cílovými skupinami a umožnil transparentnější rozhodování poroty.<\u002Fp><span style=\"color:#2E2270;font-weight:500;font-size:14px;margin-top:18px;\">Číst více →<\u002Fspan><\u002Fa>\n        <a href=\"https://docs.google.com/document/d/e/2PACX-1vRwFTapxQwI475TKpI_mlho7NxgCQO5QBsKdbbTOXbLFtv71_s4rwSyluP1FyV8_7V2sQGZlRMEC3I9/pub\" target=\"_blank\" class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;text-decoration:none;\"><div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#EDEBFA;color:#5B4BD6;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Strategie dopadu<\u002Fspan><span style=\"background:#DDEEE8;color:#2F8F77;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Teorie změny<\u002Fspan><\u002Fdiv><h3 style=\"font-size:20px;font-weight:600;margin:16px 0 4px;line-height:1.3;color:#221C57;\">Impact Hub Česká republika<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;margin-bottom:10px;\">Strategie dopadu pro síť organizací s posláním<\u002Fdiv><p style=\"font-size:14px;color:#6B6980;line-height:1.6;flex:1;font-weight:300;\">Impactso pomohlo Impact Hub Česká republika vytvořit sdílenou strategii dopadu a teorii změny pro síť v Praze, Brně a Ostravě. Rámec vyjasnil roli Impact Hubu při budování ekosystému, kde mohou růst organizace s posláním a propojovat byznys se společenskou a environmentální hodnotou.<\u002Fp><span style=\"color:#2E2270;font-weight:500;font-size:14px;margin-top:18px;\">Číst více →<\u002Fspan><\u002Fa>\n        <a href=\"https://docs.google.com/document/d/e/2PACX-1vRwFTapxQwI475TKpI_mlho7NxgCQO5QBsKdbbTOXbLFtv71_s4rwSyluP1FyV8_7V2sQGZlRMEC3I9/pub\" target=\"_blank\" class=\"reveal pcard\" style=\"background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:30px;display:flex;flex-direction:column;text-decoration:none;\"><div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#FBF1CF;color:#A9820A;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Evaluace<\u002Fspan><span style=\"background:#E9E8F6;color:#3A3490;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:999px;\">Platforma<\u002Fspan><\u002Fdiv><h3 style=\"font-size:20px;font-weight:600;margin:16px 0 4px;line-height:1.3;color:#221C57;\">AI dětem — AI Accelerator<\u002Fh3><div style=\"font-size:13px;color:#8A88A0;font-weight:300;margin-bottom:10px;\">Evaluace systémové změny napříč šesti školami<\u002Fdiv><p style=\"font-size:14px;color:#6B6980;line-height:1.6;flex:1;font-weight:300;\">Impactso pomohlo AI dětem navrhnout a řídit evaluaci programu AI Accelerator, který podporuje české školy v odpovědném zavádění umělé inteligence. Díky platformě Impactso zůstal jeden konzistentní datový rámec napříč šesti školami a umožnil jasné porovnání aktivit, výstupů i výsledků.<\u002Fp><span style=\"color:#2E2270;font-weight:500;font-size:14px;margin-top:18px;\">Číst více →<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KONTAKT -->\n  <section id=\"kontakt\" style=\"background:#F4F5F7;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;\">\n      <div class=\"reveal\" style=\"text-align:center;max-width:760px;margin:0 auto;\">\n        <span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Začněme spolupráci<\u002Fspan>\n        <h2 style=\"font-size:40px;font-weight:500;letter-spacing:-.02em;margin:20px 0 0;line-height:1.14;color:#221C57;\">Chcete zjistit, jak může měření dopadu pomoci vaší organizaci?<\u002Fh2>\n        <p style=\"font-size:18px;color:#5C5B74;line-height:1.6;margin-top:18px;font-weight:300;\">Domluvte si strategickou konzultaci nebo nám napište.<br>Společně najdeme nejlepší první krok.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr;gap:24px;margin-top:46px;align-items:start;max-width:680px;margin-left:auto;margin-right:auto;\">\n        <div class=\"reveal\" style=\"background:#241D58;color:#fff;border-radius:24px;padding:34px;\">\n          <h3 style=\"font-size:23px;font-weight:600;\">Strategická konzultace<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#C7C3EC;line-height:1.6;margin-top:12px;font-weight:300;\">30minutový call, ve kterém zmapujeme vaši situaci a najdeme nejlepší první krok pro měření dopadu ve vaší organizaci.<\u002Fp>\n          <ul style=\"list-style:none;margin-top:22px;display:flex;flex-direction:column;gap:12px;\">\n            <li style=\"display:flex;gap:11px;align-items:center;font-size:14px;color:#E0DEF4;font-weight:300;\"><span style=\"color:#7BD3AE;\">✓<\u002Fspan>Zcela zdarma, bez závazků<\u002Fli>\n            <li style=\"display:flex;gap:11px;align-items:center;font-size:14px;color:#E0DEF4;font-weight:300;\"><span style=\"color:#7BD3AE;\">✓<\u002Fspan>Online nebo osobně<\u002Fli>\n            <li style=\"display:flex;gap:11px;align-items:center;font-size:14px;color:#E0DEF4;font-weight:300;\"><span style=\"color:#7BD3AE;\">✓<\u002Fspan>Odpovíme na vaše otázky<\u002Fli>\n            <li style=\"display:flex;gap:11px;align-items:center;font-size:14px;color:#E0DEF4;font-weight:300;\"><span style=\"color:#7BD3AE;\">✓<\u002Fspan>Konkrétní doporučení pro váš případ<\u002Fli>\n          <\u002Ful>\n          <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"display:block;text-align:center;margin-top:26px;background:#fff;color:#241D58;text-decoration:none;font-size:15px;font-weight:600;padding:14px;border-radius:13px;\">Domluvit 30min konzultaci<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INDEX -->\n  <section id=\"index\" style=\"background:#F4F5F7;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 28px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;\">\n      <div class=\"reveal\">\n        <span style=\"display:inline-block;background:#E9E8F6;color:#3A3490;font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;\">Diagnostický nástroj<\u002Fspan>\n        <h2 style=\"font-size:40px;font-weight:500;letter-spacing:-.02em;margin:20px 0 0;line-height:1.14;color:#221C57;\">Zjistěte, jak je vaše organizace připravená měřit dopad<\u002Fh2>\n        <p style=\"font-size:17px;color:#5C5B74;line-height:1.6;margin-top:18px;font-weight:300;\">Impactso Index je chytrá analýza aktuálního stavu organizace. Pomůže vám pochopit, jak dnes pracujete s dopadem, kde jsou slabá místa a jaké kroky vám pomohou posunout se dál.<\u002Fp>\n        <ul style=\"list-style:none;margin-top:24px;display:flex;flex-direction:column;gap:13px;\">\n          <li style=\"display:flex;gap:12px;align-items:center;font-size:15px;color:#3C3A52;font-weight:300;\"><span style=\"width:22px;height:22px;border-radius:50%;background:#DDEEE8;color:#2F8F77;display:flex;align-items:center;justify-content:center;font-size:12px;\">✓<\u002Fspan>Zjistíte, jak systematicky pracujete s dopadem dnes<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:center;font-size:15px;color:#3C3A52;font-weight:300;\"><span style=\"width:22px;height:22px;border-radius:50%;background:#DDEEE8;color:#2F8F77;display:flex;align-items:center;justify-content:center;font-size:12px;\">✓<\u002Fspan>Odhalíte konkrétní slabá místa a příležitosti<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:center;font-size:15px;color:#3C3A52;font-weight:300;\"><span style=\"width:22px;height:22px;border-radius:50%;background:#DDEEE8;color:#2F8F77;display:flex;align-items:center;justify-content:center;font-size:12px;\">✓<\u002Fspan>Dostanete doporučení pro nejbližší kroky<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:center;font-size:15px;color:#3C3A52;font-weight:300;\"><span style=\"width:22px;height:22px;border-radius:50%;background:#DDEEE8;color:#2F8F77;display:flex;align-items:center;justify-content:center;font-size:12px;\">✓<\u002Fspan>Celý proces trvá méně než 5 minut<\u002Fli>\n        <\u002Ful>\n        <a href=\"#kontakt\" style=\"display:inline-block;margin-top:26px;background:#2E2270;color:#fff;text-decoration:none;font-size:15px;font-weight:500;padding:14px 26px;border-radius:13px;\">Vyplnit Impactso Index<\u002Fa>\n        <p style=\"font-size:13px;color:#8A88A0;margin-top:14px;font-weight:300;\">Formulář bude brzy k dispozici. Zatím nám napište — rádi vám index provedeme osobně.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"position:relative;background:#fff;border:1px solid #ECECF1;border-radius:22px;padding:32px;box-shadow:0 26px 56px -34px rgba(40,30,90,.35);\">\n        <span style=\"position:absolute;top:-14px;right:24px;background:#F2C200;color:#5A4500;border-radius:12px;padding:8px 14px;text-align:center;box-shadow:0 10px 20px -10px rgba(242,194,0,.6);\"><span style=\"display:block;font-size:13px;font-weight:600;\">Zdarma<\u002Fspan><span style=\"display:block;font-size:10.5px;\">Bez závazků<\u002Fspan><\u002Fspan>\n        <div><div style=\"font-size:13px;font-weight:600;color:#2E2270;\">Impactso Index<\u002Fdiv><div style=\"font-size:12.5px;color:#8A88A0;font-weight:300;\">Ukázkové hodnocení organizace<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;margin-top:24px;\">\n          <div style=\"width:104px;height:104px;border-radius:50%;background:conic-gradient(#2E2270 0% 63%, #ECE9F6 63% 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><div style=\"width:80px;height:80px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;\"><span style=\"font-size:30px;font-weight:600;color:#2E2270;\">63<\u002Fspan><span style=\"font-size:10px;color:#8A88A0;\">z 100 bodů<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:13px;\">\n            <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:400;color:#4A4860;margin-bottom:5px;\"><span>Strategie dopadu<\u002Fspan><span>72%<\u002Fspan><\u002Fdiv><div style=\"height:7px;background:#EEEDF3;border-radius:6px;\"><div style=\"width:72%;height:100%;background:#2E2270;border-radius:6px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:400;color:#4A4860;margin-bottom:5px;\"><span>Sběr dat<\u002Fspan><span>45%<\u002Fspan><\u002Fdiv><div style=\"height:7px;background:#EEEDF3;border-radius:6px;\"><div style=\"width:45%;height:100%;background:#F2C200;border-radius:6px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:400;color:#4A4860;margin-bottom:5px;\"><span>Reporting<\u002Fspan><span>58%<\u002Fspan><\u002Fdiv><div style=\"height:7px;background:#EEEDF3;border-radius:6px;\"><div style=\"width:58%;height:100%;background:#2E2270;border-radius:6px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div><div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:400;color:#4A4860;margin-bottom:5px;\"><span>Komunikace<\u002Fspan><span>80%<\u002Fspan><\u002Fdiv><div style=\"height:7px;background:#EEEDF3;border-radius:6px;\"><div style=\"width:80%;height:100%;background:#4FB3A0;border-radius:6px;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F6F7F9;border:1px solid #EAEAF0;border-radius:14px;padding:16px;margin-top:22px;\"><div style=\"font-size:12px;font-weight:600;color:#2E2270;\">Doporučení pro vás<\u002Fdiv><p style=\"font-size:13.5px;color:#4A4860;line-height:1.55;margin-top:6px;font-weight:300;\">Máte solidní základ ve strategii. Největší příležitost je ve sběru dat a systematizaci reportingu.<\u002Fp><\u002Fdiv>\n        <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:6px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;font-size:12px;color:#8A88A0;font-weight:300;padding:5px 10px;\"><span style=\"width:52px;flex-shrink:0;font-weight:600;color:#A8A6BC;\">0–25<\u002Fspan><span>Výchozí úroveň<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;font-size:12px;color:#8A88A0;font-weight:300;padding:5px 10px;\"><span style=\"width:52px;flex-shrink:0;font-weight:600;color:#A8A6BC;\">26–50<\u002Fspan><span>Rozvíjející se organizace<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;font-size:12.5px;color:#2E2270;font-weight:500;padding:7px 10px;background:#F0EFF8;border-radius:9px;\"><span style=\"width:52px;flex-shrink:0;font-weight:700;\">51–75<\u002Fspan><span style=\"flex:1;\">Pokročilé řízení dopadu<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#5A4500;background:#F2C200;padding:2px 8px;border-radius:999px;\">Vaše úroveň<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;font-size:12px;color:#8A88A0;font-weight:300;padding:5px 10px;\"><span style=\"width:52px;flex-shrink:0;font-weight:600;color:#A8A6BC;\">76–100<\u002Fspan><span>Lídr společenského dopadu<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:11.5px;color:#A8A6B8;text-align:center;margin-top:14px;font-weight:300;\">Ukázkový výstup — váš výsledek se bude lišit<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#1B1646;color:#fff;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:58px 28px 28px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:32px;\">\n      <div>\n        <div style=\"display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1;\"><svg viewBox=\"0 0 120 16\" width=\"118\" height=\"15\" style=\"display:block;margin-left:1px;\"><path d=\"M5 13 Q60 -4 115 13\" fill=\"none\" stroke=\"#F2C200\" stroke-width=\"3.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-weight:700;font-size:25px;color:#fff;letter-spacing:-.04em;\">impacts<span style=\"color:#F2C200;\">o<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;color:#A6A2CF;line-height:1.6;margin-top:14px;max-width:280px;font-weight:300;\">A world where social impact matters.<\u002Fp>\n        <div style=\"margin-top:24px;max-width:300px;\">\n          <div style=\"font-size:14px;font-weight:600;color:#fff;line-height:1.3;\">Odebírejte náš newsletter ze světa impaktu<\u002Fdiv>\n          <p style=\"font-size:13px;color:#A6A2CF;line-height:1.5;margin-top:8px;font-weight:300;\">Registrujte se. Inspirujte se. Buďte součástí systémové změny.<\u002Fp>\n          <form onsubmit=\"{{ subscribe }}\" style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;\">\n            <input type=\"email\" value=\"{{ nlEmail }}\" onchange=\"{{ setNlEmail }}\" required=\"true\" placeholder=\"Váš e-mail\" style=\"flex:1;min-width:150px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:11px;padding:11px 14px;font-size:14px;font-family:inherit;color:#fff;outline:none;\">\n            <button type=\"submit\" style=\"background:#F2C200;color:#3A2E00;border:none;font-size:13px;font-weight:600;padding:11px 16px;border-radius:11px;cursor:pointer;white-space:nowrap;\">ODEBÍRAT<\u002Fbutton>\n          <\u002Fform>\n          <sc-if value=\"{{ nlSent }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-size:12.5px;color:#7BD3AE;margin-top:10px;\">Děkujeme za přihlášení k odběru!<\u002Fp>\n          <\u002Fsc-if>\n          <p style=\"font-size:11px;color:#807CAC;line-height:1.5;margin-top:10px;font-weight:300;\">Odesláním formuláře souhlasím se zpracováním osobních údajů a zasíláním marketingové komunikace.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">O nás<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:16px;\">\n          <a href=\"#kontakt\" style=\"font-size:14px;color:#A6A2CF;text-decoration:none;font-weight:300;\">FAQs<\u002Fa>\n          <a href=\"#kontakt\" style=\"font-size:14px;color:#A6A2CF;text-decoration:none;font-weight:300;\">Tým<\u002Fa>\n          <a href=\"#\" style=\"font-size:14px;color:#A6A2CF;text-decoration:none;font-weight:300;\">GDPR<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">Další zdroje<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:16px;\">\n          <a href=\"#platforma\" style=\"font-size:14px;color:#A6A2CF;font-weight:300;text-decoration:none;\">Platforma<\u002Fa>\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Demo ukázka<\u002Fspan>\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Případové studie<\u002Fspan>\n          <span style=\"font-size:14px;color:#A6A2CF;font-weight:300;\">Impactso Index<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:600;color:#fff;\">Kontakt<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#A6A2CF;line-height:1.7;margin-top:16px;font-weight:300;\">Impactso s.r.o.<br>K Zátiší 362/5, 147 00 Praha 4<br>IČO 19088159<br><a href=\"mailto:info@impactso.com\" style=\"color:#9D90F0;text-decoration:none;\">info@impactso.com<\u002Fa><\u002Fdiv>\n        <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"display:inline-block;margin-top:12px;background:#2E2270;color:#fff;text-decoration:none;font-size:13.5px;font-weight:500;padding:10px 18px;border-radius:11px;\">Domluvit konzultaci<\u002Fa>\n        <div style=\"display:flex;gap:10px;margin-top:18px;\">\n          <a href=\"https://www.linkedin.com/company/impactso\" target=\"_blank\" aria-label=\"LinkedIn\" style=\"width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#C7C3EC;\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"currentColor\"><path d=\"M4.98 3.5A2.5 2.5 0 102.5 6 2.5 2.5 0 004.98 3.5zM3 8.5h4V21H3zM9 8.5h3.8v1.7h.05a4.2 4.2 0 013.78-2.08c4 0 4.74 2.64 4.74 6.07V21H20.3v-5.5c0-1.31-.02-3-1.83-3s-2.1 1.43-2.1 2.9V21H12.6z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <a href=\"mailto:info@impactso.com\" aria-label=\"E-mail\" style=\"width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#C7C3EC;\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:0 auto;padding:20px 28px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;\">\n      <span style=\"font-size:12.5px;color:#8682B0;font-weight:300;\">© 2026 Impactso. Všechna práva vyhrazena.<\u002Fspan>\n      <div style=\"display:flex;gap:18px;\"><a href=\"#\" style=\"font-size:12.5px;color:#8682B0;text-decoration:none;font-weight:300;\">Zásady ochrany osobních údajů<\u002Fa><a href=\"#\" style=\"font-size:12.5px;color:#8682B0;text-decoration:none;font-weight:300;\">Cookies<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- STICKY CTA BAR -->\n  <div ref=\"{{ ctaRef }}\" style=\"position:fixed;left:0;right:0;bottom:0;z-index:60;opacity:0;transform:translateY(110%);transition:opacity .3s ease,transform .35s cubic-bezier(.22,.61,.36,1);pointer-events:none;background:rgba(46,34,112,.96);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.12);box-shadow:0 -10px 30px -16px rgba(40,30,90,.5);\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:13px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n      <span style=\"display:flex;flex-direction:column;align-items:flex-start;gap:1px;flex-shrink:0;\"><svg viewBox=\"0 0 120 16\" width=\"92\" height=\"12\"><path d=\"M5 13 Q60 -4 115 13\" fill=\"none\" stroke=\"#F2C200\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <span style=\"font-size:15px;font-weight:500;color:#fff;line-height:1.35;flex:1;min-width:200px;\">Ready to make your impact measurable?<\u002Fspan>\n      <a href=\"https://calendly.com/stelzer-impactso/new-meeting?month=2026-05\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;background:#F2C200;color:#221C57;text-decoration:none;font-size:14.5px;font-weight:600;padding:12px 22px;border-radius:11px;white-space:nowrap;flex-shrink:0;\">Book a demo<svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name:'', email:'', org:'', type:'', message:'', sent:false, lang:'cz', nlEmail:'', nlSent:false };\n  EN = {\n    \"Proč dopad\":\"Why impact\",\"Služby\":\"Services\",\"Platforma\":\"Platform\",\"Klienti\":\"Clients\",\"Aktuality\":\"News\",\"Kontakt\":\"Contact\",\n    \"Proměňte svůj společenský dopad v\":\"Turn your social impact\",\"důkazy, kterým lidé věří\":\"into evidence\",\n    \"Měníme způsob, jakým firmy, organizace a nadace měří a prokazují svůj pozitivní společenský dopad – a tím jim otevíráme cestu k financování, důvěryhodnosti a růstu.\":\"We transform the way how companies, organizations & foundations measure and prove positive social impact — unlocking funding, credibility, and growth.\",\n    \"Domluvit strategickou konzultaci\":\"Book a strategic consultation\",\"Zjistit, proč měřit dopad\":\"Learn why to measure impact\",\n    \"Pro firmy, nadace, neziskové organizace a investory\":\"For companies, foundations, nonprofits, and investors\",\n    \"Efektivita\":\"Efficiency\",\"Řízení\":\"Management\",\"Komunikace\":\"Communication\",\n    \"Dlouhodobá spolupráce\":\"Long-term partnership\",\"Klientů\":\"Clients\",\"Případových studií\":\"Case studies\",\"Let zkušeností\":\"Years of experience\",\n    \"Proč to dělat systematicky\":\"Why do it systematically\",\"Proč měřit společenský dopad?\":\"Why measure social impact?\",\n    \"Celosvětově čelíme bezprecedentní krizi nedůvěry a izolace. 60 % lidí je přesvědčených, že je systém zmanipulovaný, přímo je poškozuje a slouží pouze úzké skupině bohatých.\":\"Globally we face an unprecedented crisis of distrust and isolation. 60% of people believe the system is rigged, harms them directly, and serves only a narrow group of the wealthy.\",\n    \"(Edelman Trust Barometer 2026)\":\"(Edelman Trust Barometer 2026)\",\n    \"Jsme tu proto, abychom to změnili. Chceme vrátit do hry všechny shareholdery a pomoci nastavit systém, ze kterého profitují všichni — a ukázat skutečný pozitivní dopad odpovědných firem, neziskových organizací a nadací.\":\"We are here to change that. We want to bring all stakeholders back into the game and help set up a system that benefits everyone — and show the real positive impact of responsible companies, nonprofits, and foundations.\",\n    \"Důvěra\":\"Trust\",\"Víme, že důvěra se nebuduje skrze sliby a slogany. Naše partnery učíme přesouvat pozornost od marketingu ke komunikaci výsledků, kterým mohou jednotliví stakeholdeři důvěřovat.\":\"We know that trust cannot be built on promises and slogans. We teach our partners how to shift their focus from marketing to communicating results that stakeholders can trust.\",\n    \"Lepší rozhodování\":\"Better decisions\",\"Důkazy\":\"Evidence\",\"Konec social washingu. Nahrazujeme domněnky a dobré úmysly ověřenými daty o skutečném dopadu pro lepší rozhodování.\":\"No more social washing. Turn activities into measurable proof of impact and better decisions.\",\n    \"Efektivita prostředků\":\"Resource efficiency\",\"Růst\":\"Growth\",\"Propojujeme společenský dopad s obchodními cíli, reputací a dlouhodobou výkonností firmy.\":\"We align social impact with business objectives, reputation, and long-term company performance.\",\n    \"Silnější komunikace\":\"Stronger communication\",\"Motivace\":\"Motivation\",\"Ukazujeme zaměstnancům, donůrům a partnerům, jakou změnu pomáhají vytvářet a posilujeme jejich dlouhodobé zapojení a hrdost z výsledků.\":\"We help employees, donors, partners, and communities see the difference they are helping create, and we strengthen their long-term commitment and pride in the results we’ve achieved.\",\n    \"Organizace, které měří dopad, jsou důvěryhodnější, efektivnější a lépe financované.\":\"Organizations that measure impact are more trustworthy, more effective, and better funded.\",\n    \"Donátoři, investoři i partneři se stále více rozhodují podle dat — ne jen dobrých úmyslů.\":\"Donors, investors, and partners increasingly decide based on data — not just intentions.\",\n    \"Klíčový trend 2024–2026\":\"Key trend 2024–2026\",\n    \"Problém, který řešíme\":\"The problem we solve\",\"Když dopad neměříme, zůstáváme u dojmů\":\"Without measuring impact, we stay at impressions\",\n    \"Mnoho organizací dělá smysluplnou práci, ale nedokáže ji jednoduše doložit, řídit ani komunikovat. Výsledkem je nižší důvěra, slabší reporting a rozhodování podle pocitů místo dat.\":\"Many organizations do meaningful work but can't easily evidence, manage, or communicate it. The result is lower trust, weaker reporting, and decisions based on gut feeling instead of data.\",\n    \"Bez měření dopadu\":\"Without impact measurement\",\"Jak to vypadá dnes\":\"How it looks today\",\n    \"Roztříštěná data v různých tabulkách a souborech\":\"Fragmented data across various spreadsheets and files\",\n    \"Nejasné výsledky — víme, co děláme, ne co to mění\":\"Unclear results — we know what we do, not what it changes\",\n    \"Reporting jako povinná administrativa\":\"Reporting as mandatory paperwork\",\n    \"Slabší argumentace před donory a investory\":\"Weaker arguments before donors and investors\",\n    \"Rozhodování podle pocitů místo dat\":\"Decisions based on gut feeling instead of data\",\n    \"Nízká důvěra stakeholderů\":\"Low stakeholder trust\",\"Typický reporting bez systému\":\"Typical reporting without a system\",\n    \"S Impactso\":\"With Impactso\",\"Jak to vypadá se systémem\":\"How it looks with a system\",\n    \"Jasný rámec dopadu — víme, co měříme a proč\":\"A clear impact framework — we know what we measure and why\",\n    \"Data připravená k rozhodování v reálném čase\":\"Data ready for decisions in real time\",\n    \"Reporting, který dává smysl a posiluje vztahy\":\"Reporting that makes sense and strengthens relationships\",\n    \"Silnější argumentace a vyšší důvěryhodnost\":\"Stronger arguments and greater credibility\",\n    \"Lepší alokace prostředků na základě výsledků\":\"Better resource allocation based on results\",\n    \"Stakeholdeři vidí hodnotu a věří ve vaši práci\":\"Stakeholders see the value and trust your work\",\n    \"Přehledný reporting s Impactso\":\"Clear reporting with Impactso\",\"Dopad\":\"Impact\",\n    \"Přechod od pocitů\":\"From gut feeling\",\"k datovým rozhodnutím\":\"to data-driven decisions\",\n    \"Zákaznická cesta\":\"Customer journey\",\"Od strategie k\":\"From strategy to\",\"měření systémového dopadu\":\"systemic impact measurement\",\n    \"Každá spolupráce začíná tam, kde jste dnes, a postupuje tempem, které vám dává smysl.\":\"Every collaboration starts where you are today and moves at a pace that makes sense for you.\",\n    \"Analýza\":\"Analysis\",\"Strategie\":\"Strategy\",\"Chytrá analýza aktuálního stavu. Pomůže odhalit, kde se organizace nachází a jaké kroky dávají největší smysl.\":\"A smart analysis of the current state. It helps reveal where the organization stands and which steps make the most sense.\",\n    \"Strategická konzultace\":\"Strategic consultation\",\"Impaktová strategie\":\"Impact Strategy\",\"Zmapujeme vaši situaci, potřeby, cíle a příležitosti v oblasti měření dopadu. Společně najdeme nejlepší první krok.\":\"We map your situation, needs, goals, and opportunities in impact measurement. Together we find the best first step.\",\n    \"Metodika\":\"Methodology\",\"Návrh rámce dopadu\":\"Impact framework design\",\"Společně definujeme logiku změny, cílové skupiny, výstupy, výsledky a indikátory. Základ pro vše, co následuje.\":\"Together we define the theory of change, target groups, outputs, outcomes, and indicators. The foundation for everything that follows.\",\n    \"Výstupy\":\"Outputs\",\"Report & Evaluace\":\"Report & Evaluation\",\"Převedeme data do srozumitelných výstupů pro management, donory, partnery nebo veřejnost.\":\"We turn data into clear outputs for management, donors, partners, or the public.\",\n    \"Impactso Platforma\":\"Impactso Platform\",\"Digitální prostředí pro správu, sběr a vyhodnocování dat o dopadu. Dopad na jednom místě, dostupný kdykoliv.\":\"A digital environment for managing, collecting, and evaluating impact data. Impact in one place, available anytime.\",\n    \"Chci zjistit, kde začít\":\"I want to find out where to start\",\n    \"Technologické zázemí\":\"Technology behind it\",\"Data o dopadu na\":\"Impact data in\",\"jednom místě\":\"one place\",\n    \"Impactso Platforma pomáhá organizacím sbírat, spravovat a vyhodnocovat data o společenském dopadu. Reporting se nestává jednorázovou povinností, ale nástrojem pro řízení změny.\":\"Impactso Platform helps organizations collect, manage, and evaluate social impact data. Reporting becomes not a one-off duty but a tool for managing change.\",\n    \"Indikátory\":\"Indicators\",\"+3 tento měsíc\":\"+3 this month\",\"Datové sady\":\"Datasets\",\"+12 tento měsíc\":\"+12 this month\",\"Reporty\":\"Reports\",\"+1 tento měsíc\":\"+1 this month\",\n    \"Trend dopadu — poslední 6 měsíců\":\"Impact trend — last 6 months\",\"Vzdělávání\":\"Education\",\"Zaměstnatelnost\":\"Employability\",\"Komunita\":\"Community\",\n    \"Správa indikátorů\":\"Indicator management\",\"Definujte a spravujte klíčové ukazatele dopadu na jednom místě. Sledujte, co opravdu měříte.\":\"Define and manage key impact indicators in one place. Track what you really measure.\",\n    \"Sběr dat\":\"Data collection\",\"Centralizovaný sběr dat ze všech zdrojů — formuláře, integrace, ruční vkládání. Vše přehledně na jednom místě.\":\"Centralized data collection from all sources — forms, integrations, manual entry. All clearly in one place.\",\n    \"Vyhodnocování dopadu\":\"Impact evaluation\",\"Automatizované výpočty, trendová analýza a přehledné vizualizace. Rychle pochopíte, co data říkají.\":\"Automated calculations, trend analysis, and clear visualizations. Quickly understand what the data say.\",\n    \"Reporting a exporty\":\"Reporting and exports\",\"Generujte reporty pro různé stakeholdery. Export do PDF, Excelu nebo přímé sdílení přes platformu.\":\"Generate reports for various stakeholders. Export to PDF, Excel, or share directly via the platform.\",\n    \"Platforma v aktivním vývoji — zapojte se jako první, vaše potřeby formují, jak vypadá.\":\"Platform in active development — join first, your needs shape how it looks.\",\n    \"Pro koho pracujeme\":\"Who we work for\",\"Pro organizace, které chtějí rozhodovat\":\"For organizations that want to decide\",\"podle dopadu\":\"by impact\",\n    \"Pracujeme s různými typy organizací. Každá má jiné potřeby — ale sdílí jeden cíl: vytvářet prokazatelnou hodnotu.\":\"We work with various types of organizations. Each has different needs — but shares one goal: to create provable value.\",\n    \"Firmy\":\"Companies\",\"CSR, ESG, nadační a komunitní programy\":\"CSR, ESG, foundation and community programs\",\n    \"Prokažte smysluplnost vašich společenských aktivit. Lépe rozhodujte o alokaci prostředků a komunikujte hodnotu CSR a ESG programů stakeholderům i veřejnosti.\":\"Prove the meaningfulness of your social activities. Make better resource-allocation decisions and communicate the value of CSR and ESG programs to stakeholders and the public.\",\n    \"CSR měření\":\"CSR measurement\",\"Komunitní programy\":\"Community programs\",\"Nadační aktivity\":\"Foundation activities\",\"Dobrovolnictví\":\"Volunteering\",\n    \"Nadace\":\"Foundations\",\"Grantové programy a komunikace výsledků\":\"Grant programs and results communication\",\n    \"Lépe měřte výsledky grantových programů, komunikujte dopad donorům a zvyšujte důvěryhodnost vaší práce. Data, která mluví za vás.\":\"Measure grant-program results better, communicate impact to donors, and increase the credibility of your work. Data that speak for you.\",\n    \"Grantový reporting\":\"Grant reporting\",\"Dopad programů\":\"Program impact\",\"Komunikace donorům\":\"Donor communication\",\"Hodnocení příjemců\":\"Recipient evaluation\",\n    \"Neziskové organizace\":\"Nonprofits\",\"Řízení dopadu a fundraising\":\"Impact management and fundraising\",\n    \"Ukažte hodnotu své práce, zlepšete reporting a získejte silnější argumenty pro fundraising. Systematické řízení dopadu, které dává smysl i malým týmům.\":\"Show the value of your work, improve reporting, and gain stronger arguments for fundraising. Systematic impact management that makes sense even for small teams.\",\n    \"Dopadový reporting\":\"Impact reporting\",\"Evaluace programů\":\"Program evaluation\",\"Transparentní komunikace\":\"Transparent communication\",\n    \"Investoři\":\"Investors\",\"Hodnocení dopadových investic\":\"Impact investment evaluation\",\n    \"Hodnoťte společenský dopad investic, porovnávejte projekty a rozhodujte na základě dat. Impact due diligence pro moderní investory.\":\"Assess the social impact of investments, compare projects, and decide based on data. Impact due diligence for modern investors.\",\n    \"Srovnání projektů\":\"Project comparison\",\"ESG hodnocení\":\"ESG assessment\",\n    \"Nejste si jistí, do které kategorie patříte?\":\"Not sure which category you fit?\",\"Pojďme si promluvit →\":\"Let's talk →\",\n    \"Spolupracujeme s organizacemi, kterým záleží na skutečné změně\":\"We work with organizations that care about real change\",\n    \"Partneři a klienti\":\"Partners and clients\",\"Loga a konkrétní reference budou doplněny — nyní probíhá příprava.\":\"Logos and specific references will be added — preparation is underway.\",\n    \"Jak pracujeme\":\"How we work\",\"Pomáháme proměnit dopad v\":\"We help turn impact into a\",\"systém\":\"system\",\n    \"Impactso propojuje strategické konzultace, metodiku, analýzu, reporting a technologii. Díky tomu pomáhá organizacím přejít od nahodilého vykazování aktivit k systematickému řízení dopadu.\":\"Impactso connects strategic consulting, methodology, analysis, reporting, and technology. This helps organizations move from ad-hoc activity reporting to systematic impact management.\",\n    \"Reference\":\"References\",\"Případové studie\":\"Case studies\",\n    \"Konkrétní příběhy organizací a výsledky, kterých s námi dosáhly.\":\"Real stories of organizations and the results they achieved with us.\",\n    \"Podívejte se, jak Impactso pomáhá firmám a organizacím proměnit investice do komunity, dobrovolnictví a grantové programy v měřitelný společenský dopad.\":\"See how Impactso helps companies and organizations turn community investment, volunteering and grantmaking into measurable evidence of social impact.\",\n    \"Zobrazit vše\":\"View all\",\"Číst více →\":\"Read more →\",\n    \"Měření dopadu\":\"Impact measurement\",\"Reporting & evaluace\":\"Reporting & evaluation\",\"Evaluace\":\"Evaluation\",\"Teorie změny\":\"Theory of change\",\n    \"Zaměstnanecké dobrovolnictví napříč zeměmi\":\"Employee volunteering across countries\",\n    \"Impactso pomohlo Allwyn změřit společenskou hodnotu zaměstnaneckého dobrovolnictví, fundraisingu a darování zdrojů napříč několika zeměmi. Vznikl jednotný rámec, nástroje pro zpětnou vazbu stakeholderů a konsolidovaný reporting — Allwyn se tak posunul od počítání aktivit k důkazům o reálném dopadu v komunitách.\":\"Impactso helped Allwyn measure the social value of employee volunteering, fundraising and resource donation activities across multiple countries. The project created a unified framework, stakeholder feedback tools and a consolidated reporting structure — helping Allwyn move beyond activity counts towards evidence of real community impact.\",\n    \"Grantový program ve spojení s F1®\":\"A grantmaking program in partnership with F1®\",\n    \"Impactso pomohlo Allwyn navrhnout dopadově orientovaný proces přihlašování a hodnocení pro F1® Allwyn Global Community Award. Rámec propojil komunitní projekty se strategickými pilíři Allwyn, cíli udržitelného rozvoje a cílovými skupinami a umožnil transparentnější rozhodování poroty.\":\"Impactso helped Allwyn design an impact-oriented application and evaluation process for the F1® Allwyn Global Community Award. The framework connected community projects to Allwyn's strategic pillars, SDGs and target groups, enabling more transparent jury decision-making and stronger evidence for responsible corporate engagement.\",\n    \"Impact Hub Česká republika\":\"Impact Hub Czech Republic\",\"Strategie dopadu pro síť organizací s posláním\":\"Impact strategy for a network of purpose-driven organizations\",\n    \"Impactso pomohlo Impact Hub Česká republika vytvořit sdílenou strategii dopadu a teorii změny pro síť v Praze, Brně a Ostravě. Rámec vyjasnil roli Impact Hubu při budování ekosystému, kde mohou růst organizace s posláním a propojovat byznys se společenskou a environmentální hodnotou.\":\"Impactso helped Impact Hub Czech Republic create a shared impact strategy and Theory of Change for its network across Prague, Brno and Ostrava. The framework clarified Impact Hub's role in building an ecosystem where purpose-driven organizations can grow, connect business with social and environmental value, and contribute to positive change.\",\n    \"Evaluace systémové změny napříč šesti školami\":\"Evaluating systemic change across six schools\",\n    \"Impactso pomohlo AI dětem navrhnout a řídit evaluaci programu AI Accelerator, který podporuje české školy v odpovědném zavádění umělé inteligence. Díky platformě Impactso zůstal jeden konzistentní datový rámec napříč šesti školami a umožnil jasné porovnání aktivit, výstupů i výsledků.\":\"Impactso helped AI dětem design and manage the evaluation of the AI Accelerator, a program supporting Czech schools in the responsible adoption of artificial intelligence. Using the Impactso Platform, the evaluation kept one consistent data framework across six schools, enabling clear comparison of activities, outputs and emerging outcomes.\",\n    \"Začněme spolupráci\":\"Let's start working together\",\"Chcete zjistit, jak může měření dopadu pomoci vaší organizaci?\":\"Want to find out how impact measurement can help your organization?\",\n    \"Domluvte si strategickou konzultaci nebo nám napište.\":\"Book a strategic consultation or write to us.\",\"Společně najdeme nejlepší první krok.\":\"Together we'll find the best first step.\",\n    \"30minutový call, ve kterém zmapujeme vaši situaci a najdeme nejlepší první krok pro měření dopadu ve vaší organizaci.\":\"A 30-minute call in which we map your situation and find the best first step for measuring impact in your organization.\",\n    \"Zcela zdarma, bez závazků\":\"Completely free, no commitment\",\"Online nebo osobně\":\"Online or in person\",\"Odpovíme na vaše otázky\":\"We'll answer your questions\",\"Konkrétní doporučení pro váš případ\":\"Specific recommendations for your case\",\n    \"Domluvit 30min konzultaci\":\"Book a 30-min consultation\",\n    \"Diagnostický nástroj\":\"Diagnostic tool\",\"Zjistěte, jak je vaše organizace připravená měřit dopad\":\"Find out how ready your organization is to measure impact\",\n    \"Impactso Index je chytrá analýza aktuálního stavu organizace. Pomůže vám pochopit, jak dnes pracujete s dopadem, kde jsou slabá místa a jaké kroky vám pomohou posunout se dál.\":\"Impactso Index is a smart analysis of your organization's current state. It helps you understand how you work with impact today, where the weak spots are, and which steps will move you forward.\",\n    \"Zjistíte, jak systematicky pracujete s dopadem dnes\":\"See how systematically you work with impact today\",\n    \"Odhalíte konkrétní slabá místa a příležitosti\":\"Uncover specific weak spots and opportunities\",\n    \"Dostanete doporučení pro nejbližší kroky\":\"Get recommendations for the next steps\",\"Celý proces trvá méně než 5 minut\":\"The whole process takes under 5 minutes\",\n    \"Vyplnit Impactso Index\":\"Fill in Impactso Index\",\"Formulář bude brzy k dispozici. Zatím nám napište — rádi vám index provedeme osobně.\":\"The form will be available soon. For now, write to us — we'll gladly guide you through the index personally.\",\n    \"Zdarma\":\"Free\",\"Bez závazků\":\"No commitment\",\"Ukázkové hodnocení organizace\":\"Sample organization assessment\",\"z 100 bodů\":\"of 100 points\",\"Strategie dopadu\":\"Impact strategy\",\n    \"Doporučení pro vás\":\"Recommendation for you\",\n    \"Výchozí úroveň\":\"Starting Point\",\"Rozvíjející se organizace\":\"Emerging\",\"Pokročilé řízení dopadu\":\"Established\",\"Lídr společenského dopadu\":\"Impact Leader\",\"Vaše úroveň\":\"Your level\",\"Máte solidní základ ve strategii. Největší příležitost je ve sběru dat a systematizaci reportingu.\":\"You have a solid foundation in strategy. The biggest opportunity is in data collection and systematizing reporting.\",\n    \"Ukázkový výstup — váš výsledek se bude lišit\":\"Sample output — your result will differ\",\n    \"Odebírejte náš newsletter ze světa impaktu\":\"Subscribe to our newsletter from the world of impact\",\"Registrujte se. Inspirujte se. Buďte součástí systémové změny.\":\"Sign up. Get inspired. Be part of systemic change.\",\n    \"ODEBÍRAT\":\"SUBSCRIBE\",\"Odesláním formuláře souhlasím se zpracováním osobních údajů a zasíláním marketingové komunikace.\":\"By submitting the form I consent to the processing of personal data and to receiving marketing communication.\",\n    \"O nás\":\"About us\",\"Tým\":\"Team\",\"Další zdroje\":\"Resources\",\"Demo ukázka\":\"Request a Demo\",\"Případové studie\":\"Case studies\",\n    \"Domluvit konzultaci\":\"Book a consultation\",\n    \"© 2026 Impactso. Všechna práva vyhrazena.\":\"© 2026 Impactso. All rights reserved.\",\"Zásady ochrany osobních údajů\":\"Privacy policy\",\n    \"Impactso nás provedlo procesem měření dopadu přímo v kontextu naší neziskové organizace a ukázalo nám, jak jednotlivé kroky účinně aplikovat na naše konkrétní aktivity. Oceňujeme, že Impactso propojuje srozumitelnou metodiku s praktickým softwarovým řešením, které neziskovým organizacím šetří čas, zjednodušuje práci s daty a pomáhá lépe prokazovat skutečný dopad jejich práce.\":\"Impactso guided us through the process of measuring impact directly in the context of our nonprofit and showed us how to effectively apply each step to our specific activities. We appreciate that Impactso combines a clear methodology with a practical software solution that saves nonprofits time, simplifies working with data, and helps better demonstrate the real impact of their work.\",\n    \"Head of Organization and Finance · AI dětem\":\"Head of Organization and Finance · AI dětem\",\"CSR Manager · Allwyn\":\"CSR Manager · Allwyn\",\"ESG Manager · Zátiší Group a.s.\":\"ESG Manager · Zátiší Group a.s.\"\n  };\n  CZ = {\n    \"Platform\":\"Platforma\",\"Why?\":\"Proč?\",\"Services\":\"Služby\",\"Case Studies\":\"Případové studie\",\"Contact\":\"Kontakt\",\n    \"Book a demo\":\"Domluvit ukázku\",\"Ready to make your impact measurable?\":\"Připraveni měřit svůj dopad?\",\n    \"Collaborating with Impactso has been a truly positive experience. Their team supported us in Allwyn in establishing impact measurement for our global volunteering project across all our markets. We greatly appreciated their flexibility, speed, and professionalism, as well as the excellent guidance and leadership they provided throughout both projects.\":\"Spolupráce s Impactso byla skutečně pozitivní zkušenost. Jejich tým nám v Allwyn pomohl nastavit měření dopadu našeho globálního dobrovolnického projektu napříč všemi trhy. Velmi jsme ocenili jejich flexibilitu, rychlost a profesionalitu i vynikající vedení, které nám v průběhu obou projektů poskytovali.\",\n    \"Our long-term goal is to make our CSR/community activities more effective in terms of: impact and real change, PR opportunities, and/or business opportunities – e.g., building our brand and reaching new target customer groups. The collaboration with IMPACTSO helped us define the current state, confirm the significance of these activities’ contribution to our company, and set the next steps for greater efficiency.\":\"Naším dlouhodobým cílem je zefektivnit naše CSR/komunitní aktivity z hlediska: dopadu a reálné změny, PR příležitostí a/nebo obchodních příležitostí – např. budování značky a oslovení nových cílových skupin zákazníků. Spolupráce s IMPACTSO nám pomohla definovat současný stav, potvrdit význam přínosu těchto aktivit pro naši firmu a nastavit další kroky k vyšší efektivitě.\",\n    \"Head of Organization and Finance · AI dětem\":\"Vedoucí organizace a financí · AI dětem\",\"CSR Manager · Allwyn\":\"CSR manažerka · Allwyn\",\"ESG Manager · Zátiší Group a.s.\":\"ESG manažer · Zátiší Group a.s.\"\n  };\n  collectNodes() {\n    if (!this._orig) this._orig = new WeakMap();\n    const scope = this.root.parentElement || this.root;\n    const w = document.createTreeWalker(scope, NodeFilter.SHOW_TEXT);\n    this._nodes = []; let n;\n    while (n = w.nextNode()) {\n      if (!n.nodeValue.trim()) continue;\n      if (!this._orig.has(n)) this._orig.set(n, n.nodeValue);\n      this._nodes.push(n);\n    }\n  }\n  applyLang(lang) {\n    if (!this.root) return;\n    this.collectNodes();\n    const map = lang === 'en' ? this.EN : this.CZ;\n    this._nodes.forEach((node) => {\n      const raw = this._orig.get(node); const key = raw.trim();\n      const tr = map[key];\n      node.nodeValue = tr ? raw.replace(key, tr) : raw;\n    });\n    const inp = (this.root.parentElement || this.root).querySelector('input[type=\"email\"]');\n    if (inp) inp.placeholder = lang === 'en' ? 'Your e-mail' : 'Váš e-mail';\n  }\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState && prevState.lang !== this.state.lang) this.applyLang(this.state.lang);\n  }\n  componentDidMount() {\n    if (!this.root) return;\n    const els = () => this.root ? [...this.root.querySelectorAll('.reveal:not(.anim)')] : [];\n    const check = () => {\n      if (!this.root) return;\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      els().forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < h * 0.95 && r.bottom > 0) el.classList.add('anim');\n      });\n    };\n    const hero = (this.root.parentElement || this.root).querySelector('#top');\n    const ctaCheck = () => {\n      if (!this.ctaBar) return;\n      const heroBottom = hero ? hero.getBoundingClientRect().bottom : 600;\n      const show = heroBottom < 40;\n      this.ctaBar.style.opacity = show ? '1' : '0';\n      this.ctaBar.style.transform = show ? 'translateY(0)' : 'translateY(110%)';\n      this.ctaBar.style.pointerEvents = show ? 'auto' : 'none';\n    };\n    const both = () => { check(); ctaCheck(); };\n    this._check = both;\n    both();\n    requestAnimationFrame(both);\n    window.addEventListener('scroll', both, true);\n    window.addEventListener('resize', both);\n    this.applyLang(this.state.lang);\n  }\n  componentWillUnmount() {\n    if (this._check) { window.removeEventListener('scroll', this._check, true); window.removeEventListener('resize', this._check); }\n  }\n  set = (k) => (e) => this.setState({ [k]: e.target.value });\n  submit = (e) => { e.preventDefault(); if(this.state.name && this.state.email && this.state.message) this.setState({ sent:true }); };\n  renderVals() {\n    return {\n      rootRef: (el)=>{ this.root = el; },\n      ctaRef: (el)=>{ this.ctaBar = el; },\n      name:this.state.name, email:this.state.email, org:this.state.org, type:this.state.type, message:this.state.message,\n      sent:this.state.sent, notSent:!this.state.sent,\n      setName:this.set('name'), setEmail:this.set('email'), setOrg:this.set('org'), setType:this.set('type'), setMessage:this.set('message'),\n      submit:this.submit,\n      setCz:()=>{this.setState({lang:'cz'}); this.applyLang('cz');}, setEn:()=>{this.setState({lang:'en'}); this.applyLang('en');},\n      nlEmail:this.state.nlEmail, nlSent:this.state.nlSent, setNlEmail:this.set('nlEmail'),\n      subscribe:(e)=>{e.preventDefault(); if(this.state.nlEmail) this.setState({nlSent:true});},\n      czBg:this.state.lang==='cz'?'#2E2270':'transparent', czColor:this.state.lang==='cz'?'#fff':'#6B6980',\n      enBg:this.state.lang==='en'?'#2E2270':'transparent', enColor:this.state.lang==='en'?'#fff':'#6B6980'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
